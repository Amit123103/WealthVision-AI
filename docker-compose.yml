version: '3.8'

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealth_api
    depends_on:
      - db
      - redis
      - minio
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealth_worker
    depends_on:
      - db
      - redis
      - minio
    env_file: .env
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app worker --loglevel=info

  db:
    image: postgis/postgis:15-3.3
    container_name: wealth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wealth_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wealth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: wealth_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealth_web
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    depends_on:
      - api
    volumes:
      - ./frontend:/app

  gateway:
    image: nginx:alpine
    container_name: wealth_gateway
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
